<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFT 传播路径可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dde7;
      --mint: #15803d;
      --transfer: #2563eb;
      --sale: #c2410c;
      --malicious: #b42318;
      --victim: #7c3aed;
      --honest: #047857;
      --corrupted: #b54708;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      overflow: hidden;
    }

    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: end;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 750;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    input[type="file"],
    select,
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }

    input[type="file"] {
      max-width: 260px;
      padding: 6px;
    }

    select {
      min-width: 240px;
      padding: 0 10px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    button.active {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 16px 24px 24px;
      height: calc(100vh - 74px);
      overflow: hidden;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .graph-panel {
      min-width: 0;
      overflow: hidden;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .graph-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .graph-title {
      font-weight: 700;
      word-break: break-all;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .filters label {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      white-space: nowrap;
    }

    #graph {
      width: 100%;
      height: 100%;
      min-height: 0;
      background: linear-gradient(#fff, #fbfcfe);
    }

    #roleChart {
      width: 100%;
      height: 220px;
    }

    .side {
      display: grid;
      gap: 16px;
      align-content: start;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 4px;
    }

    .sidebar-tabs {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 0 0 2px;
      background: var(--bg);
    }

    .tab-button {
      min-width: 0;
      width: 100%;
      font-weight: 650;
    }

    .tab-button.active {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }

    .tab-panel {
      display: none;
      gap: 16px;
      align-content: start;
    }

    .tab-panel.active {
      display: grid;
    }

    .section {
      padding: 14px 16px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.25;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      min-width: 0;
    }

    .metric .value {
      display: block;
      font-size: 18px;
      font-weight: 760;
    }

    .metric .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 230px;
      overflow: auto;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      font-size: 12px;
      background: #fff;
    }

    .item strong {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      line-height: 1.25;
      word-break: break-all;
    }

    .item span {
      color: var(--muted);
      word-break: break-word;
    }

    .kv {
      display: grid;
      grid-template-columns: 94px minmax(0, 1fr);
      gap: 5px 8px;
      align-items: start;
      margin-top: 6px;
    }

    .kv dt {
      color: var(--muted);
      font-size: 11px;
    }

    .kv dd {
      margin: 0;
      color: #1d2939;
      font-size: 12px;
      word-break: break-word;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 5px 0 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2f7;
      color: #344054;
      font-size: 11px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .chip.malicious,
    .chip.minter,
    .chip.mint_role,
    .chip.wash_cycle,
    .chip.star_distributor,
    .chip.rapid_spreader,
    .chip.external_ancestor {
      background: #fee4e2;
      color: #912018;
    }

    .chip.victim_buyer,
    .chip.stuck_victim {
      background: #ede9fe;
      color: #5b21b6;
    }

    .chip.honest_holder,
    .chip.current_holder {
      background: #dcfae6;
      color: #05603a;
    }

    .chip.operator_address_candidate,
    .chip.concentrated_operator_revenue,
    .chip.probable_infringement_campaign,
    .chip.positive_observed_sale_or_victimization,
    .chip.positive_future_sale_or_victimization,
    .chip.early_detection_positive {
      background: #fff1e6;
      color: #9a3412;
    }

    .chip.victim_address_candidate,
    .chip.corrupted_victim_candidate {
      background: #f4ebff;
      color: #6941c6;
    }

    .note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .warning {
      margin-top: 8px;
      border: 1px solid #fedf89;
      border-radius: 7px;
      background: #fffaeb;
      color: #93370d;
      padding: 8px 9px;
      font-size: 12px;
    }

    .timeline {
      display: grid;
      gap: 8px;
    }

    .stage-card {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      background: #fff;
    }

    .stage-dot {
      width: 10px;
      height: 10px;
      margin-top: 4px;
      border-radius: 50%;
      background: #667085;
    }

    .stage-card.copy_preparation .stage-dot,
    .stage-card.replica_deployment .stage-dot {
      background: #b42318;
    }

    .stage-card.replica_mint .stage-dot,
    .stage-card.distribution .stage-dot {
      background: #15803d;
    }

    .stage-card.primary_monetization .stage-dot,
    .stage-card.monetization .stage-dot,
    .stage-card.market_fee .stage-dot {
      background: #c2410c;
    }

    .stage-card.victimization .stage-dot {
      background: #7c3aed;
    }

    .stage-card strong {
      display: block;
      font-size: 12px;
    }

    .stage-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      word-break: break-word;
    }

    .flow-list {
      display: grid;
      gap: 6px;
    }

    .flow-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #edf0f5;
      padding: 5px 0;
      font-size: 12px;
    }

    .flow-row:last-child {
      border-bottom: 0;
    }

    .flow-row b {
      font-weight: 650;
      word-break: break-word;
    }

    .flow-row em {
      color: var(--muted);
      font-style: normal;
      white-space: nowrap;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin: 6px 0;
    }

    .summary-row .mini {
      border: 1px solid #edf0f5;
      border-radius: 6px;
      padding: 5px 6px;
      min-width: 0;
    }

    .summary-row .mini b {
      display: block;
      color: #111827;
      font-size: 13px;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-row .mini em {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-style: normal;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      padding: 40px 24px;
      color: var(--muted);
      text-align: center;
    }

    .node-label {
      fill: #111827;
      font-size: 11px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .edge-label {
      fill: #475467;
      font-size: 10px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
    }

    .node {
      cursor: pointer;
      stroke: #fff;
      stroke-width: 2;
    }

    .edge {
      fill: none;
      stroke-width: 2.2;
      opacity: 0.74;
      cursor: pointer;
    }

    .edge:hover,
    .node:hover {
      opacity: 1;
      stroke-width: 3.2;
    }

    .axis {
      stroke: #edf0f5;
      stroke-width: 1;
    }

    .lane-label {
      fill: #98a2b3;
      font-size: 11px;
    }

    @media (max-width: 980px) {
      header {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
        height: calc(100vh - 132px);
      }

      #graph {
        min-height: 360px;
      }

      .side {
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>NFT 传播路径可视化</h1>
      <p class="subtitle">读取 Rust 导出的 nft_propagation_paths，按合约查看 mint、转移、成交和地址角色。</p>
    </div>
    <div class="toolbar">
      <input id="fileInput" type="file" accept=".json,application/json">
      <select id="contractSelect" disabled>
        <option>请选择 JSON</option>
      </select>
      <select id="tokenSelect" disabled>
        <option value="">全部 Token</option>
      </select>
    </div>
  </header>

  <main>
    <section class="panel graph-panel">
      <div class="graph-header">
        <div class="graph-title" id="graphTitle">尚未加载报告</div>
        <div class="filters">
          <label><input type="checkbox" data-channel="mint" checked> mint</label>
          <label><input type="checkbox" data-channel="transfer" checked> transfer</label>
          <label><input type="checkbox" data-channel="sale" checked> sale</label>
          <label><input id="victimOnlyInput" type="checkbox"> 仅受害者相关</label>
        </div>
      </div>
      <div id="graph" role="img" aria-label="NFT propagation graph"></div>
    </section>

    <aside class="side">
      <div class="sidebar-tabs" role="tablist" aria-label="侧边栏信息类型">
        <button class="tab-button active" type="button" data-sidebar-tab="global">全局模型</button>
        <button class="tab-button" type="button" data-sidebar-tab="selection">选中对象</button>
      </div>

      <div id="globalInfoPanel" class="tab-panel active" role="tabpanel">
        <section class="panel section">
          <h2>研究模型概览</h2>
          <div id="modelOverview"></div>
        </section>
      </div>

      <div id="selectionInfoPanel" class="tab-panel" role="tabpanel">
        <section class="panel section">
          <h2>合约指标</h2>
          <div class="metrics" id="metrics"></div>
        </section>
        <section class="panel section">
          <h2>生命周期阶段</h2>
          <div id="lifecyclePanel"></div>
        </section>
        <section class="panel section">
          <h2>弱监督和资金证据</h2>
          <div id="evidencePanel"></div>
        </section>
        <section class="panel section">
          <h2>图例</h2>
          <div class="legend">
            <span style="color: var(--mint)"><i class="dot"></i>Mint</span>
            <span style="color: var(--transfer)"><i class="dot"></i>转移</span>
          <span style="color: var(--sale)"><i class="dot"></i>成交</span>
            <span style="color: var(--malicious)"><i class="dot"></i>疑似操作者</span>
            <span style="color: var(--victim)"><i class="dot"></i>疑似受害者</span>
            <span style="color: var(--corrupted)"><i class="dot"></i>被腐化地址</span>
            <span style="color: var(--honest)"><i class="dot"></i>中性/诚实参与者</span>
          </div>
        </section>
        <section class="panel section">
          <h2>角色和边类型分布</h2>
          <div id="roleChart"></div>
        </section>
        <section class="panel section">
          <h2>选中详情</h2>
          <div id="details" class="item"><span>点击节点或边查看证据字段。</span></div>
        </section>
        <section class="panel section">
          <h2>Token 路径样本</h2>
          <div class="list" id="tokenList"></div>
        </section>
        <section class="panel section">
          <h2>高风险地址</h2>
          <div class="list" id="riskList"></div>
        </section>
      </div>
    </aside>
  </main>

  <script>
    const state = {
      report: null,
      paths: {},
      selectedContract: "",
      selectedToken: "",
      channels: new Set(["mint", "transfer", "sale"]),
      victimOnly: false,
      sidebarTab: "global",
    };

    const fileInput = document.getElementById("fileInput");
    const contractSelect = document.getElementById("contractSelect");
    const tokenSelect = document.getElementById("tokenSelect");
    const victimOnlyInput = document.getElementById("victimOnlyInput");
    const graphTitle = document.getElementById("graphTitle");
    const graph = document.getElementById("graph");
    const modelOverview = document.getElementById("modelOverview");
    const metrics = document.getElementById("metrics");
    const lifecyclePanel = document.getElementById("lifecyclePanel");
    const evidencePanel = document.getElementById("evidencePanel");
    const details = document.getElementById("details");
    const tokenList = document.getElementById("tokenList");
    const riskList = document.getElementById("riskList");
    const roleChart = document.getElementById("roleChart");
    const sidebarTabButtons = Array.from(document.querySelectorAll("[data-sidebar-tab]"));
    const sidebarPanels = {
      global: document.getElementById("globalInfoPanel"),
      selection: document.getElementById("selectionInfoPanel"),
    };
    let cy = null;
    let roleChartInstance = null;

    const STAGE_LABELS = {
      copy_preparation: "复制准备",
      reference_deployment: "官方部署",
      replica_deployment: "仿冒部署",
      replica_mint: "复制铸造",
      distribution: "传播分发",
      market_exposure: "市场曝光",
      primary_monetization: "初次变现",
      market_fee: "市场费用",
      monetization: "二级变现",
      victimization: "受害购买",
      exit_or_cleanup: "退场/复用",
      stage_transition: "阶段转移",
    };

    const STAGE_ORDER = [
      "copy_preparation",
      "reference_deployment",
      "replica_deployment",
      "replica_mint",
      "distribution",
      "market_exposure",
      "primary_monetization",
      "market_fee",
      "monetization",
      "victimization",
      "exit_or_cleanup",
      "stage_transition",
    ];

    const LABEL_NAMES = {
      operator_address_candidate: "疑似操作者",
      victim_address_candidate: "疑似受害者",
      corrupted_victim_candidate: "污染受害者",
      probable_infringement_campaign: "疑似侵权活动",
      concentrated_operator_revenue: "资金集中",
      early_detection_positive: "早期检测正例",
      positive_observed_sale_or_victimization: "已观测变现/受害",
      positive_future_sale_or_victimization: "未来变现/受害",
      suspected_operator: "疑似操作者",
      suspected_colluder: "疑似协作者",
      likely_victim: "疑似受害者",
      corrupted_victim: "被腐化受害者",
      neutral_participant: "中性参与者",
    };

    const CHANNEL_NAMES = {
      mint_payment: "铸造付款",
      sale_payment: "销售收入",
      protocol_fee: "平台费用",
      royalty_fee: "版税流",
      withdrawal: "提现",
      funding: "启动资金",
      revenue_backflow: "收入回流",
    };

    const COVERAGE_NAMES = {
      same_tx_native_eth_only: "仅同交易原生 ETH",
      same_tx_native_eth_and_stablecoin_erc20: "同交易 ETH + 稳定币 ERC20",
      erc20_transfers_not_traced: "未追踪 ERC20",
      erc20_flows_not_traced: "未追踪 ERC20",
      later_withdrawals_not_exhaustive: "后续提现未穷尽",
      cex_bridge_mixer_not_classified: "CEX/Bridge/Mixer 未分类",
      multi_hop_consolidation_not_traced: "多跳归集未追踪",
      royalty_receiver_unresolved: "版税接收者未解析",
    };

    function shortAddress(value) {
      if (!value) return "unknown";
      if (value.length <= 16) return value;
      return `${value.slice(0, 8)}…${value.slice(-6)}`;
    }

    function isZeroAddress(value) {
      return /^0x0{40}$/i.test(String(value || ""));
    }

    function displayAddress(value) {
      if (!value) return "n/a";
      if (isZeroAddress(value)) return "mint source (0x0000000000000000000000000000000000000000)";
      return value;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function displayValue(value) {
      if (value === undefined || value === null || value === "") return "n/a";
      if (typeof value === "number") {
        if (!Number.isFinite(value)) return "n/a";
        return Number.isInteger(value) ? value.toLocaleString() : value.toLocaleString(undefined, { maximumFractionDigits: 4 });
      }
      return String(value);
    }

    function formatUsd(value) {
      const number = Number(value || 0);
      return `$${number.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
    }

    function formatEth(value) {
      const number = Number(value || 0);
      return `${number.toLocaleString(undefined, { maximumFractionDigits: 4 })} ETH`;
    }

    function roleChips(roles) {
      const list = roles || [];
      if (list.length === 0) return '<div class="chips"><span class="chip">无角色标签</span></div>';
      return `<div class="chips">${list.map((role) => `<span class="chip ${escapeHtml(role)}">${escapeHtml(role)}</span>`).join("")}</div>`;
    }

    function kvRows(rows) {
      return `<dl class="kv">${rows.map(([key, value, className = ""]) => (
        `<dt>${escapeHtml(key)}</dt><dd class="${className}">${escapeHtml(displayValue(value))}</dd>`
      )).join("")}</dl>`;
    }

    function miniStats(items) {
      return `<div class="summary-row">${items.map(([label, value]) => (
        `<div class="mini"><b>${escapeHtml(displayValue(value))}</b><em>${escapeHtml(label)}</em></div>`
      )).join("")}</div>`;
    }

    function clearElement(element) {
      while (element.firstChild) element.removeChild(element.firstChild);
    }

    function setSidebarTab(tab) {
      state.sidebarTab = tab === "selection" ? "selection" : "global";
      for (const button of sidebarTabButtons) {
        const active = button.dataset.sidebarTab === state.sidebarTab;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
      }
      for (const [name, panel] of Object.entries(sidebarPanels)) {
        if (!panel) continue;
        panel.classList.toggle("active", name === state.sidebarTab);
      }
      if (state.sidebarTab === "selection" && roleChartInstance) {
        setTimeout(() => roleChartInstance.resize(), 0);
      }
    }

    function showEmpty(message) {
      if (cy) {
        cy.destroy();
        cy = null;
        window.cy = null;
      }
      graph.innerHTML = `<div class="empty">${message}</div>`;
    }

    function metric(label, value) {
      const node = document.createElement("div");
      node.className = "metric";
      node.innerHTML = `<span class="value">${value}</span><span class="label">${label}</span>`;
      return node;
    }

    function roleColor(node) {
      const roles = new Set(node.roles || []);
      if (roles.has("corrupted_victim") || roles.has("corrupted_honest")) return "#b54708";
      if (roles.has("suspected_operator") || roles.has("malicious")) return "#b42318";
      if (roles.has("victim_buyer")) return "#7c3aed";
      if (roles.has("honest_holder")) return "#047857";
      if (roles.has("mint_source")) return "#475467";
      return "#344054";
    }

    function edgeColor(edge) {
      if (edge.channel === "mint") return "#15803d";
      if (edge.channel === "sale") return "#c2410c";
      return "#2563eb";
    }

    function saleTransferKey(edge) {
      return [
        edge.contract_address || "",
        edge.token_id || "",
        edge.tx_hash || "",
        edge.from_address || "",
        edge.to_address || "",
      ].join("|");
    }

    function saleTransferTxKey(edge) {
      return [
        edge.contract_address || "",
        edge.token_id || "",
        edge.tx_hash || "",
      ].join("|");
    }

    function mergeSaleAndTransferEdges(edges) {
      const saleByKey = new Map();
      const uniqueSaleByTx = new Map();
      for (const edge of edges) {
        if (edge.channel === "sale") {
          saleByKey.set(saleTransferKey(edge), edge);
          const txKey = saleTransferTxKey(edge);
          uniqueSaleByTx.set(txKey, uniqueSaleByTx.has(txKey) ? null : edge);
        }
      }
      const merged = [];
      for (const edge of edges) {
        if (edge.channel !== "transfer") {
          merged.push(edge);
          continue;
        }
        const sale = saleByKey.get(saleTransferKey(edge)) || uniqueSaleByTx.get(saleTransferTxKey(edge));
        if (!sale) {
          merged.push(edge);
          continue;
        }
        sale.merged_transfer_count = (sale.merged_transfer_count || 0) + 1;
        sale.merged_transfer_tx_hashes = sale.merged_transfer_tx_hashes || [];
        if (edge.tx_hash && !sale.merged_transfer_tx_hashes.includes(edge.tx_hash)) {
          sale.merged_transfer_tx_hashes.push(edge.tx_hash);
        }
        if (!sale.block_time && edge.block_time) sale.block_time = edge.block_time;
        if (!sale.seconds_since_mint && edge.seconds_since_mint) {
          sale.seconds_since_mint = edge.seconds_since_mint;
        }
      }
      return merged;
    }

    function aggregateEdgesForRender(edges) {
      edges = mergeSaleAndTransferEdges(edges.map((edge) => ({ ...edge })));
      const grouped = new Map();
      const rendered = [];
      for (const edge of edges) {
        if (edge.channel !== "mint" && edge.channel !== "transfer") {
          rendered.push({
            ...edge,
            aggregate_count: 1,
            token_ids: edge.token_id ? [edge.token_id] : [],
            tx_hashes: edge.tx_hash ? [edge.tx_hash] : [],
            merged_transfer_count: edge.merged_transfer_count || 0,
            merged_transfer_tx_hashes: edge.merged_transfer_tx_hashes || [],
          });
          continue;
        }

        const key = [
          edge.contract_address || "",
          edge.channel || "",
          edge.from_address || "",
          edge.to_address || "",
        ].join("|");
        let aggregate = grouped.get(key);
        if (!aggregate) {
          aggregate = {
            ...edge,
            edge_id: `aggregate:${edge.channel}:${key}`,
            aggregate_count: 0,
            token_ids: [],
            tx_hashes: [],
            first_block_number: edge.block_number || 0,
            last_block_number: edge.block_number || 0,
            first_block_time: edge.block_time || 0,
            last_block_time: edge.block_time || 0,
          };
          grouped.set(key, aggregate);
          rendered.push(aggregate);
        }
        aggregate.aggregate_count += 1;
        if (edge.token_id && !aggregate.token_ids.includes(edge.token_id)) {
          aggregate.token_ids.push(edge.token_id);
        }
        if (edge.tx_hash && !aggregate.tx_hashes.includes(edge.tx_hash)) {
          aggregate.tx_hashes.push(edge.tx_hash);
        }
        if (edge.block_number > 0) {
          aggregate.first_block_number = aggregate.first_block_number > 0
            ? Math.min(aggregate.first_block_number, edge.block_number)
            : edge.block_number;
          aggregate.last_block_number = Math.max(aggregate.last_block_number || 0, edge.block_number);
        }
        if (edge.block_time > 0) {
          aggregate.first_block_time = aggregate.first_block_time > 0
            ? Math.min(aggregate.first_block_time, edge.block_time)
            : edge.block_time;
          aggregate.last_block_time = Math.max(aggregate.last_block_time || 0, edge.block_time);
        }
      }
      return rendered;
    }

    function tokenIdsFromEdges(edges) {
      const tokenIds = new Set();
      for (const edge of edges) {
        for (const tokenId of edge.token_ids || []) {
          tokenIds.add(tokenId);
        }
        if (edge.token_id) tokenIds.add(edge.token_id);
      }
      return tokenIds;
    }

    function compactList(values, limit = 8) {
      const list = (values || []).filter(Boolean);
      if (list.length <= limit) return list.join(", ");
      return `${list.slice(0, limit).join(", ")} ... +${list.length - limit}`;
    }

    function reportArray(name) {
      const value = state.report?.[name];
      return Array.isArray(value) ? value : [];
    }

    function normalizeAddress(value) {
      return String(value || "").toLowerCase();
    }

    function sameContract(item, contract = state.selectedContract) {
      return normalizeAddress(item?.contract_address) === normalizeAddress(contract);
    }

    function labelName(value) {
      return LABEL_NAMES[value] || STAGE_LABELS[value] || CHANNEL_NAMES[value] || COVERAGE_NAMES[value] || value || "n/a";
    }

    function labelChips(values) {
      const list = (values || []).filter(Boolean);
      if (list.length === 0) return '<div class="chips"><span class="chip">无</span></div>';
      return `<div class="chips">${list.map((value) => {
        const text = String(value);
        const className = text.split(/[ (]/)[0].replace(/[^a-zA-Z0-9_-]/g, "");
        return `<span class="chip ${escapeHtml(className)}">${escapeHtml(labelName(text))}</span>`;
      }).join("")}</div>`;
    }

    function countBy(items, keyFn) {
      const counts = new Map();
      for (const item of items || []) {
        const key = keyFn(item) || "unknown";
        counts.set(key, (counts.get(key) || 0) + 1);
      }
      return Array.from(counts.entries()).sort((a, b) => b[1] - a[1]);
    }

    function stageRank(stage) {
      const index = STAGE_ORDER.indexOf(stage);
      return index >= 0 ? index : 999;
    }

    function sumBy(items, key) {
      return (items || []).reduce((sum, item) => sum + Number(item?.[key] || 0), 0);
    }

    function timestampText(value) {
      const number = Number(value || 0);
      if (number <= 0) return "未知";
      return new Date(number * 1000).toLocaleString();
    }

    function secondsText(value) {
      const seconds = Number(value || 0);
      if (seconds <= 0) return "未知";
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (days > 0) return `${days}天 ${hours}小时`;
      if (hours > 0) return `${hours}小时 ${minutes}分钟`;
      return `${Math.max(1, minutes)}分钟`;
    }

    function percentText(value) {
      const number = Number(value || 0);
      return `${(number * 100).toLocaleString(undefined, { maximumFractionDigits: 1 })}%`;
    }

    function valueFlowCoverage(flows) {
      const totalEth = sumBy(flows, "value_eth");
      const pricedEth = flows
        .filter((flow) => Number(flow.value_usd || 0) > 0)
        .reduce((sum, flow) => sum + Number(flow.value_eth || 0), 0);
      const unpricedEth = Math.max(0, totalEth - pricedEth);
      const stablecoinUsd = flows
        .filter((flow) => !["ETH", "WETH"].includes(String(flow.payment_token_symbol || "").toUpperCase()))
        .reduce((sum, flow) => sum + Number(flow.value_usd || 0), 0);
      return {
        totalEth,
        pricedEth,
        unpricedEth,
        pricedUsd: sumBy(flows, "value_usd"),
        stablecoinUsd,
        coverage: totalEth > 0 ? pricedEth / totalEth : 0,
      };
    }

    function summaryNumber(summary, key) {
      const value = Number(summary?.[key]);
      return Number.isFinite(value) ? value : null;
    }

    function lifecycleMetricFor(contract = state.selectedContract) {
      return reportArray("lifecycle_metrics").find((item) => sameContract(item, contract)) || null;
    }

    function lifecycleEventsFor(contract = state.selectedContract) {
      return reportArray("contract_lifecycle_events")
        .filter((item) => sameContract(item, contract))
        .sort((a, b) => {
          const stageDelta = stageRank(a.lifecycle_stage) - stageRank(b.lifecycle_stage);
          if (stageDelta !== 0) return stageDelta;
          return Number(a.block_time || a.block_number || 0) - Number(b.block_time || b.block_number || 0);
        });
    }

    function weakLabelsFor(contract = state.selectedContract) {
      return reportArray("weak_supervision_labels").filter((item) => sameContract(item, contract));
    }

    function evidenceFeaturesFor(contract = state.selectedContract) {
      return reportArray("address_evidence_features").filter((item) => sameContract(item, contract));
    }

    function evidenceFeatureForAddress(contract, address) {
      const needle = normalizeAddress(address);
      return evidenceFeaturesFor(contract).find((item) => normalizeAddress(item.address) === needle) || null;
    }

    function attributionClass(feature) {
      const label = feature?.attribution_label || "";
      if (label === "corrupted_victim") return "corrupted";
      if (label === "suspected_operator" || label === "suspected_colluder") return "operator";
      if (label === "likely_victim") return "victim";
      if (label === "neutral_participant") return "neutral";
      return "";
    }

    function isVictimAttributionLabel(label) {
      return label === "likely_victim" || label === "corrupted_victim";
    }

    function valueFlowsFor(contract = state.selectedContract) {
      return reportArray("value_flow_edges").filter((item) => sameContract(item, contract));
    }

    function mintPaymentFlowsForEdge(edge) {
      if (edge.channel !== "mint") return [];
      const txHashes = new Set([
        ...(edge.tx_hashes || []),
        ...(edge.tx_hash ? [edge.tx_hash] : []),
      ].filter(Boolean).map(normalizeAddress));
      if (txHashes.size === 0) return [];
      const minter = normalizeAddress(edge.to_address);
      return valueFlowsFor(edge.contract_address || state.selectedContract).filter((flow) => (
        flow.channel === "mint_payment"
        && txHashes.has(normalizeAddress(flow.tx_hash))
        && (!minter || normalizeAddress(flow.from_address) === minter)
      ));
    }

    function valueFlowAmountLabel(flows) {
      const eth = sumBy(flows, "value_eth");
      const usd = sumBy(flows, "value_usd");
      const parts = [];
      if (usd > 0) parts.push(formatUsd(usd));
      if (eth > 0) parts.push(formatEth(eth));
      return parts.join(" / ");
    }

    function mintEdgeLabel(edge) {
      const base = edge.aggregate_count > 1 ? `mint x${edge.aggregate_count}` : "mint";
      const paymentLabel = valueFlowAmountLabel(mintPaymentFlowsForEdge(edge));
      return paymentLabel ? `${base} · ${paymentLabel}` : base;
    }

    function earlyFeaturesFor(contract = state.selectedContract) {
      return reportArray("early_detection_features").filter((item) => sameContract(item, contract));
    }

    function campaignClustersFor(contract = state.selectedContract) {
      const needle = normalizeAddress(contract);
      return reportArray("campaign_clusters").filter((cluster) => (
        (cluster.contract_addresses || []).some((address) => normalizeAddress(address) === needle)
      ));
    }

    function victimAddressSet(path) {
      const victims = new Set();
      const contract = path.contract_address || state.selectedContract;
      for (const [address, node] of Object.entries(path.nodes || {})) {
        const roles = new Set(node.roles || []);
        const feature = evidenceFeatureForAddress(contract, node.address || address);
        if (
          roles.has("victim_buyer")
          || roles.has("stuck_victim")
          || roles.has("corrupted_victim")
          || node.is_stuck_victim
          || isVictimAttributionLabel(feature?.attribution_label)
        ) {
          victims.add(node.address || address);
        }
      }
      for (const feature of evidenceFeaturesFor(contract)) {
        if (isVictimAttributionLabel(feature.attribution_label) && feature.address) {
          victims.add(feature.address);
        }
      }
      return victims;
    }

    function visibleNodeAddressesFromEdges(edges) {
      const addresses = new Set();
      for (const edge of edges) {
        if (edge.from_address) addresses.add(edge.from_address);
        if (edge.to_address) addresses.add(edge.to_address);
      }
      return addresses;
    }

    function edgeKey(edge, index = 0) {
      return edge.edge_id || [
        edge.contract_address || "",
        edge.channel || "",
        edge.token_id || "",
        edge.tx_hash || "",
        edge.from_address || "",
        edge.to_address || "",
        edge.log_index ?? index,
      ].join("|");
    }

    function filterVictimRelatedEdges(path, edges) {
      const victims = victimAddressSet(path);
      if (victims.size === 0) return [];

      const normalizedVictims = new Set(Array.from(victims).map(normalizeAddress));
      const victimTokenIds = new Set();
      const incomingByTarget = new Map();
      const keepKeys = new Set();

      edges.forEach((edge, index) => {
        const from = normalizeAddress(edge.from_address);
        const to = normalizeAddress(edge.to_address);
        if (normalizedVictims.has(from) || normalizedVictims.has(to)) {
          if (edge.token_id) victimTokenIds.add(edge.token_id);
        }
        if (to) {
          if (!incomingByTarget.has(to)) incomingByTarget.set(to, []);
          incomingByTarget.get(to).push({ edge, index, from });
        }
      });

      edges.forEach((edge, index) => {
        if (edge.token_id && victimTokenIds.has(edge.token_id)) {
          keepKeys.add(edgeKey(edge, index));
        }
      });

      const queue = Array.from(normalizedVictims);
      const visitedAddresses = new Set(queue);
      while (queue.length > 0) {
        const target = queue.shift();
        for (const item of incomingByTarget.get(target) || []) {
          keepKeys.add(edgeKey(item.edge, item.index));
          if (item.from && !visitedAddresses.has(item.from)) {
            visitedAddresses.add(item.from);
            queue.push(item.from);
          }
        }
      }

      return edges.filter((edge, index) => keepKeys.has(edgeKey(edge, index)));
    }

    function roleLane(node) {
      const roles = new Set(node.roles || []);
      if (roles.has("mint_source")) return 0;
      if (roles.has("malicious") || roles.has("minter")) return 1;
      if (roles.has("victim_buyer")) return 2;
      if (roles.has("honest_holder")) return 3;
      if (roles.has("current_holder")) return 4;
      return 5;
    }

    function setDetails(title, rows) {
      details.innerHTML = `<strong>${escapeHtml(title)}</strong>${kvRows(rows)}`;
      setSidebarTab("selection");
    }

    function loadReport(report, fileName) {
      state.report = report;
      state.paths = report.nft_propagation_paths || {};
      const contracts = Object.keys(state.paths).sort();
      clearElement(contractSelect);
      clearElement(tokenSelect);

      if (contracts.length === 0) {
        contractSelect.disabled = true;
        tokenSelect.disabled = true;
        contractSelect.innerHTML = "<option>未找到传播路径</option>";
        tokenSelect.innerHTML = "<option>全部 Token</option>";
        graphTitle.textContent = fileName || "报告缺少 nft_propagation_paths";
        modelOverview.innerHTML = "";
        metrics.innerHTML = "";
        lifecyclePanel.innerHTML = "";
        evidencePanel.innerHTML = "";
        tokenList.innerHTML = "";
        riskList.innerHTML = "";
        showEmpty("当前 JSON 没有 nft_propagation_paths。请重新运行 Rust 分析导出新字段。");

      tokenSelect.disabled = false;

      all.value = "";
      all.textContent = "全部 Token";
      tokenSelect.appendChild(all);
      for (const token of (path?.token_paths || [])) {

        option.textContent = `Token ${token.token_id} · edges ${token.edge_count || 0}`;
        tokenSelect.appendChild(option);

    }

    function renderLifecyclePanel(path) {
      clearElement(lifecyclePanel);
      const metricRow = lifecycleMetricFor(path.contract_address || state.selectedContract);
      const events = lifecycleEventsFor(path.contract_address || state.selectedContract);
      const flows = valueFlowsFor(path.contract_address || state.selectedContract);
      const coverage = valueFlowCoverage(flows);
      if (!metricRow && events.length === 0) {
        lifecyclePanel.innerHTML = '<div class="item"><span>该合约没有 lifecycle_metrics 或 contract_lifecycle_events。</span></div>';
        return;
      }

      const stageGroups = new Map();
      for (const event of events) {
        const stage = event.lifecycle_stage || "unknown";
        if (!stageGroups.has(stage)) stageGroups.set(stage, []);
        stageGroups.get(stage).push(event);
      }
      const orderedStages = [
        ...STAGE_ORDER.filter((stage) => stageGroups.has(stage)),
        ...Array.from(stageGroups.keys()).filter((stage) => !STAGE_ORDER.includes(stage)),
      ];

      const coverageGaps = metricRow?.value_flow_coverage_gaps || [];
      const wrapper = document.createElement("div");
      wrapper.innerHTML = `
        ${metricRow ? miniStats([
          ["首次铸造", timestampText(metricRow.first_mint_time)],
          ["首次销售", timestampText(metricRow.first_sale_time)],
          ["首次受害", timestampText(metricRow.first_victim_time)],
        ]) : ""}
        ${metricRow ? miniStats([
          ["预结果信号", metricRow.pre_sale_signal_count || 0],
          ["早检正例", metricRow.early_detection_positive ? "yes" : "no"],
          ["级联边", metricRow.cascade_edge_count || 0],
        ]) : ""}
        ${miniStats([
          ["USD覆盖", percentText(coverage.coverage)],
          ["未定价ETH", formatEth(coverage.unpricedEth)],
          ["稳定币USD", formatUsd(coverage.stablecoinUsd)],
        ])}
        <div class="timeline">
          ${orderedStages.map((stage) => {
            const group = stageGroups.get(stage) || [];
            const first = group.find((event) => Number(event.block_time || event.block_number || 0) > 0) || group[0] || {};
            const evidenceTypes = countBy(group, (event) => event.evidence_type).slice(0, 3)
              .map(([type, count]) => `${type} ${count}`).join(" · ");
            return `
              <div class="stage-card ${escapeHtml(stage)}">
                <i class="stage-dot"></i>
                <div>
                  <strong>${escapeHtml(labelName(stage))} · ${group.length} 事件</strong>
                  <span>${escapeHtml(first.event_type || "event")} · block ${escapeHtml(displayValue(first.block_number || 0))} · ${escapeHtml(timestampText(first.block_time))}</span>
                  <span>${escapeHtml(evidenceTypes || "无证据类型统计")}</span>
                </div>
              </div>
            `;
          }).join("") || '<div class="item"><span>没有阶段事件。</span></div>'}
        </div>
        ${metricRow ? kvRows([
          ["gross ETH", formatEth(metricRow.gross_revenue_eth)],
          ["priced USD", formatUsd(metricRow.gross_revenue_usd)],
          ["operator ETH", formatEth(metricRow.operator_revenue_eth)],
          ["funding ETH", formatEth(metricRow.funding_amount_eth)],
          ["withdrawal ETH", formatEth(metricRow.withdrawal_amount_eth)],
          ["coverage", labelName(metricRow.value_flow_coverage_scope)],
          ["top recipient", metricRow.top_value_recipient_address || "n/a", "mono"],
        ]) : ""}
        ${coverageGaps.length > 0 ? `<div class="warning">覆盖缺口：${coverageGaps.map(labelName).join(" · ")}</div>` : ""}
      `;
      lifecyclePanel.appendChild(wrapper);
    }

    function renderEvidencePanel(path) {
      clearElement(evidencePanel);
      const contract = path.contract_address || state.selectedContract;
      const labels = weakLabelsFor(contract);
      const features = evidenceFeaturesFor(contract);
      const flows = valueFlowsFor(contract);
      const earlyFeatures = earlyFeaturesFor(contract);
      const clusters = campaignClustersFor(contract);
      const labelCounts = countBy(labels, (label) => label.label);
      const attributionCounts = countBy(features, (feature) => feature.attribution_label);
      const flowCounts = countBy(flows, (flow) => flow.channel);
      const coverage = valueFlowCoverage(flows);
      const topFeatures = features
        .slice()
        .sort((a, b) => Math.max(b.operator_score || 0, b.victim_score || 0, b.corruption_score || 0) - Math.max(a.operator_score || 0, a.victim_score || 0, a.corruption_score || 0))
        .slice(0, 5);

      const wrapper = document.createElement("div");
      wrapper.innerHTML = `
        ${miniStats([
          ["弱标签", labels.length],
          ["地址证据", features.length],
          ["资金边", flows.length],
        ])}
        ${miniStats([
          ["铸造付款", formatEth(sumBy(flows.filter((flow) => flow.channel === "mint_payment"), "value_eth"))],
          ["未定价ETH", formatEth(coverage.unpricedEth)],
          ["稳定币USD", formatUsd(coverage.stablecoinUsd)],
        ])}
        ${labelChips(labelCounts.map(([label, count]) => `${labelName(label)} (${count})`))}
        <div class="flow-list">
          ${flowCounts.slice(0, 6).map(([channel, count]) => {
            const channelFlows = flows.filter((flow) => flow.channel === channel);
            return `
              <div class="flow-row">
                <b>${escapeHtml(labelName(channel))}</b>
                <em>${count} 条 · ${escapeHtml(formatEth(sumBy(channelFlows, "value_eth")))} · ${escapeHtml(formatUsd(sumBy(channelFlows, "value_usd")))}</em>
              </div>
            `;
          }).join("") || '<div class="item"><span>没有资金流证据。</span></div>'}
        </div>
        <div class="note">地址归因：${attributionCounts.slice(0, 5).map(([label, count]) => `${labelName(label)} ${count}`).join(" · ") || "无"}</div>
        <div class="note">早期检测：${countBy(earlyFeatures, (feature) => feature.weak_label).map(([label, count]) => `${labelName(label)} ${count}`).join(" · ") || "无"}</div>
        ${clusters.slice(0, 2).map((cluster) => `
          <div class="item">
            <strong>${escapeHtml(cluster.cluster_id || "campaign")}</strong>
            ${miniStats([
              ["合约", (cluster.contract_addresses || []).length],
              ["操作者", (cluster.suspected_operator_addresses || []).length],
              ["受害者", (cluster.victim_addresses || []).length],
            ])}
            ${kvRows([
              ["confidence", cluster.cluster_confidence || "n/a"],
              ["gross USD", formatUsd(cluster.gross_revenue_usd)],
              ["operator USD", formatUsd(cluster.operator_revenue_usd)],
              ["channels", compactList(cluster.value_flow_channels || [], 6)],
            ])}
          </div>
        `).join("")}
        ${topFeatures.map((feature) => `
          <div class="item">
            <strong class="mono">${escapeHtml(shortAddress(feature.address))}</strong>
            ${roleChips(feature.observed_roles || [])}
            ${kvRows([
              ["label", feature.attribution_label || "n/a"],
              ["confidence", feature.confidence || "n/a"],
              ["operator", feature.operator_score || 0],
              ["victim", feature.victim_score || 0],
              ["corruption", feature.corruption_score || 0],
              ["evidence", (feature.evidence || []).map((item) => item.evidence_type).slice(0, 5).join(", ") || "n/a"],
            ])}
          </div>
        `).join("")}
      `;
      evidencePanel.appendChild(wrapper);
    }

    function renderRiskList(path, visibleNodeAddresses = null) {
      clearElement(riskList);
      const risky = Object.values(path.nodes || {})
        .filter((node) => !visibleNodeAddresses || visibleNodeAddresses.has(node.address))
        .filter((node) => {
          const feature = evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address);
          const label = feature?.attribution_label || "";
          const roles = new Set(node.roles || []);
          return label === "suspected_operator"
            || label === "suspected_colluder"
            || label === "likely_victim"
            || label === "corrupted_victim"
            || roles.has("corrupted_honest");
        })
        .sort((a, b) => {
          const aFeature = evidenceFeatureForAddress(path.contract_address || state.selectedContract, a.address);
          const bFeature = evidenceFeatureForAddress(path.contract_address || state.selectedContract, b.address);
          const aScore = Math.max(aFeature?.operator_score || 0, aFeature?.victim_score || 0, aFeature?.corruption_score || 0) + (a.total_buy_usd || 0) / 1000;
          const bScore = Math.max(bFeature?.operator_score || 0, bFeature?.victim_score || 0, bFeature?.corruption_score || 0) + (b.total_buy_usd || 0) / 1000;
          return bScore - aScore;
        })
        .slice(0, 30);
      if (risky.length === 0) {
        riskList.innerHTML = '<div class="item"><span>没有高风险地址。</span></div>';
        return;
      }
      for (const node of risky) {
        const feature = evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address);
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <strong class="mono">${escapeHtml(shortAddress(node.address))}</strong>
          ${labelChips([feature?.attribution_label || "unknown"])}
          ${roleChips(feature?.observed_roles || node.roles || [])}
          ${miniStats([
            ["买入", node.bought_token_count || 0],
            ["售出", node.sold_token_count || 0],
            ["持有", node.current_holding_token_count || 0],
          ])}
          ${kvRows([
            ["address", node.address || "n/a", "mono"],
            ["buy USD", formatUsd(node.total_buy_usd)],
            ["buy ETH", formatEth(node.total_buy_eth)],
            ["operator", feature?.operator_score || 0],
            ["victim", feature?.victim_score || 0],
            ["corruption", feature?.corruption_score || 0],
            ["minted", node.minted_token_count || 0],
            ["received", node.received_transfer_count || 0],
            ["sent", node.sent_transfer_count || 0],
            ["stuck", node.is_stuck_victim ? "yes" : "no"],
          ])}
        `;
        riskList.appendChild(item);
      }
    }

    function renderRoleChart(path, edges, visibleNodeAddresses = null) {
      if (!window.echarts) {
        roleChart.innerHTML = '<div class="empty">ECharts 未加载。</div>';
        return;
      }
      if (!roleChartInstance) roleChartInstance = echarts.init(roleChart);
      const nodes = Object.values(path.nodes || {})
        .filter((node) => !visibleNodeAddresses || visibleNodeAddresses.has(node.address));
      const roleCounts = [
        ["疑似操作者", nodes.filter((node) => ["suspected_operator", "suspected_colluder"].includes(evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address)?.attribution_label)).length],
        ["疑似受害者", nodes.filter((node) => evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address)?.attribution_label === "likely_victim").length],
        ["被腐化地址", nodes.filter((node) => evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address)?.attribution_label === "corrupted_victim").length],
        ["中性参与者", nodes.filter((node) => evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address)?.attribution_label === "neutral_participant").length],
      ];
      const edgeCounts = ["mint", "transfer", "sale"].map((channel) => ({
        name: channel,
        value: edges
          .filter((edge) => edge.channel === channel)
          .reduce((sum, edge) => sum + (edge.aggregate_count || 1), 0),
      }));
      roleChartInstance.setOption({
        animation: false,
        color: ["#b42318", "#7c3aed", "#047857", "#475467", "#15803d", "#2563eb", "#c2410c"],
        grid: { left: 0, right: 0, top: 0, bottom: 0 },
        tooltip: { trigger: "item" },
        series: [
          {
            type: "pie",
            radius: ["45%", "72%"],
            center: ["28%", "50%"],
            data: roleCounts.map(([name, value]) => ({ name, value })),
            label: { fontSize: 11 },
          },
          {
            type: "pie",
            radius: ["45%", "72%"],
            center: ["74%", "50%"],
            data: edgeCounts,
            label: { fontSize: 11 },
          },
        ],
      });
    }

    function nodeClass(node, feature = null) {
      const roles = new Set(node.roles || []);
      if (roles.has("mint_source")) return "mint-source";
      const inferred = attributionClass(feature);
      if (inferred) return inferred;
      if (roles.has("corrupted_honest")) return "corrupted";
      if (roles.has("victim_buyer")) return "victim";
      if (roles.has("malicious")) return "operator";
      if (roles.has("honest_holder")) return "neutral";
      if (roles.has("current_holder")) return "holder";
      return "other";
    }

    function renderCytoscapeGraph(path, edges) {
      if (!window.cytoscape) {
        showEmpty("Cytoscape.js 未加载。请检查网络或改用本地库文件。");
        return;
      }
      if (cy) {
        cy.destroy();
        cy = null;
        window.cy = null;
      }
      graph.innerHTML = "";
      if (edges.length === 0) {
        showEmpty("当前过滤条件下没有边。");
        return;
      }

      const touched = new Set();
      for (const edge of edges) {
        if (edge.from_address) touched.add(edge.from_address);
        if (edge.to_address) touched.add(edge.to_address);
      }
      const elements = [];
      const addedNodes = new Set();
      for (const [address, node] of Object.entries(path.nodes || {})) {
        if (!touched.has(address)) continue;
        addedNodes.add(normalizeAddress(address));
        const feature = evidenceFeatureForAddress(path.contract_address || state.selectedContract, address);
        elements.push({
          group: "nodes",
          data: {
            id: address,
            label: shortAddress(address),
            address,
            roles: (node.roles || []).join(", "),
            attribution: feature?.attribution_label || "",
            buyUsd: Number(node.total_buy_usd || 0).toFixed(2),
            holding: node.current_holding_token_count || 0,
            weight: Math.max(18, Math.min(44, 18 + (node.roles || []).length * 3 + Math.sqrt(node.bought_token_count || 0) * 2)),
          },
          classes: nodeClass(node, feature),
        });
      }
      for (const address of touched) {
        if (addedNodes.has(normalizeAddress(address))) continue;
        elements.push({
          group: "nodes",
          data: {
            id: address,
            label: shortAddress(address),
            address,
            roles: "external_ancestor",
            buyUsd: "0.00",
            holding: 0,
            weight: 18,
          },
          classes: "other",
        });
      }
      for (const edge of edges) {
        if (!touched.has(edge.from_address) || !touched.has(edge.to_address)) continue;
        const mintPaymentFlows = mintPaymentFlowsForEdge(edge);
        const mintPaymentLabel = valueFlowAmountLabel(mintPaymentFlows);
        elements.push({
          group: "edges",
          data: {
            id: edge.edge_id,
            source: edge.from_address,
            target: edge.to_address,
            label: edge.channel === "mint"
              ? mintEdgeLabel(edge)
              : edge.aggregate_count > 1
                ? `${edge.channel} x${edge.aggregate_count}`
                : edge.channel === "sale" && edge.price_usd
                ? `$${Number(edge.price_usd).toFixed(1)}`
                : edge.channel,
            channel: edge.channel,
            contract: edge.contract_address,
            token: edge.aggregate_count > 1 ? `${edge.aggregate_count} tokens` : edge.token_id,
            tokenIds: edge.token_ids || (edge.token_id ? [edge.token_id] : []),
            tx: edge.tx_hash,
            txHashes: edge.tx_hashes || (edge.tx_hash ? [edge.tx_hash] : []),
            block: edge.block_number,
            firstBlock: edge.first_block_number || edge.block_number,
            lastBlock: edge.last_block_number || edge.block_number,
            count: edge.aggregate_count || 1,
            marketplace: edge.marketplace,
            eventType: edge.event_type,
            blockTime: edge.block_time,
            firstBlockTime: edge.first_block_time || edge.block_time,
            lastBlockTime: edge.last_block_time || edge.block_time,
            priceEth: edge.price_eth,
            priceUsd: edge.price_usd,
            mintPaymentEth: sumBy(mintPaymentFlows, "value_eth"),
            mintPaymentUsd: sumBy(mintPaymentFlows, "value_usd"),
            mintPaymentLabel,
            mintPaymentSymbols: compactList(Array.from(new Set(mintPaymentFlows.map((flow) => flow.payment_token_symbol).filter(Boolean))), 5),
            mergedTransferCount: edge.merged_transfer_count || 0,
            mergedTransferTxHashes: edge.merged_transfer_tx_hashes || [],
            secondsSinceMint: edge.seconds_since_mint,
            underlyingChannels: edge.underlying_channels || [],
            width: Math.min(8, 2 + Math.log2((edge.aggregate_count || 1) + 1)),
          },
          classes: edge.channel,
        });
      }

      cy = cytoscape({
        container: graph,
        elements,
        wheelSensitivity: 0.18,
        layout: {
          name: "breadthfirst",
          directed: true,
          spacingFactor: 1.25,
          avoidOverlap: true,
          roots: elements
            .filter((item) => item.group === "nodes" && item.data.id === "0x0000000000000000000000000000000000000000")
            .map((item) => item.data.id),
        },
        style: [
          {
            selector: "node",
            style: {
              "background-color": "#344054",
              "border-color": "#ffffff",
              "border-width": 2,
              width: "data(weight)",
              height: "data(weight)",
              label: "data(label)",
              "font-size": 10,
              color: "#111827",
              "text-outline-color": "#ffffff",
              "text-outline-width": 3,
              "text-valign": "bottom",
              "text-margin-y": 7,
            },
          },
          { selector: "node.operator", style: { "background-color": "#b42318" } },
          { selector: "node.victim", style: { "background-color": "#7c3aed" } },
          { selector: "node.corrupted", style: { "background-color": "#b54708" } },
          { selector: "node.neutral", style: { "background-color": "#047857" } },
          { selector: "node.holder", style: { "background-color": "#475467" } },
          { selector: "node.mint-source", style: { "background-color": "#98a2b3", shape: "round-rectangle" } },
          {
            selector: "edge",
            style: {
              width: 2,
              "curve-style": "bezier",
              "target-arrow-shape": "triangle",
              "line-color": "#2563eb",
              "target-arrow-color": "#2563eb",
              label: "data(label)",
              width: "data(width)",
              "font-size": 9,
              color: "#475467",
              "text-background-color": "#ffffff",
              "text-background-opacity": 0.85,
              "text-background-padding": 2,
            },
          },
          { selector: "edge.mint", style: { "line-color": "#15803d", "target-arrow-color": "#15803d" } },
          { selector: "edge.sale", style: { "line-color": "#c2410c", "target-arrow-color": "#c2410c", width: 3 } },
          { selector: ":selected", style: { "border-width": 4, "border-color": "#111827", "line-color": "#111827", "target-arrow-color": "#111827" } },
        ],
      });
      window.cy = cy;

      cy.on("tap", "node", (event) => {
        const node = event.target.data();
        const feature = evidenceFeatureForAddress(path.contract_address || state.selectedContract, node.address);
        setDetails("节点", [
          ["address", node.address],
          ["roles", node.roles],
          ["graph_label", labelName(feature?.attribution_label || node.attribution || "unknown")],
          ["attribution", feature?.attribution_label || "n/a"],
          ["confidence", feature?.confidence || "n/a"],
          ["operator_score", feature?.operator_score || 0],
          ["victim_score", feature?.victim_score || 0],
          ["corruption_score", feature?.corruption_score || 0],
          ["evidence", (feature?.evidence || []).map((item) => item.evidence_type).slice(0, 6).join(", ") || "n/a"],
          ["buy_usd", node.buyUsd],
          ["holding", node.holding],
        ]);
      });
      cy.on("tap", "edge", (event) => {
        const edge = event.target.data();
        setDetails("边", [
          ["channel", edge.channel],
          ["contract", edge.contract, "mono"],
          ["count", edge.count],
          ["token", edge.token],
          ["token_samples", compactList(edge.tokenIds)],
          ["from", displayAddress(edge.source), "mono"],
          ["to", displayAddress(edge.target), "mono"],
          ["event_type", edge.eventType],
          ["underlying", compactList(edge.underlyingChannels)],
          ["tx", edge.tx],
          ["tx_samples", compactList(edge.txHashes, 5)],
          ["block", edge.count > 1 ? `${edge.firstBlock} - ${edge.lastBlock}` : edge.block],
          ["time", edge.count > 1 ? `${timestampText(edge.firstBlockTime)} - ${timestampText(edge.lastBlockTime)}` : timestampText(edge.blockTime)],
          ["marketplace", edge.marketplace],
          ["price_eth", edge.priceEth],
          ["price_usd", edge.priceUsd],
          ["mint_payment", edge.mintPaymentLabel || "n/a"],
          ["mint_payment_eth", edge.mintPaymentEth || 0],
          ["mint_payment_usd", edge.mintPaymentUsd || 0],
          ["mint_payment_symbols", edge.mintPaymentSymbols || "n/a"],
          ["merged_transfer_count", edge.mergedTransferCount],
          ["merged_transfer_tx_samples", compactList(edge.mergedTransferTxHashes, 5)],
          ["seconds_since_mint", edge.secondsSinceMint],
        ]);
      });
      cy.fit(undefined, 36);
    }

    function renderGraph(path, edges) {
      renderCytoscapeGraph(path, edges);
      return;

      clearElement(graph);
      if (edges.length === 0) {
        showEmpty("当前过滤条件下没有边。");
        return;
      }

      const width = Math.max(graph.clientWidth || 900, 820);
      const height = graph.clientHeight || 620;
      graph.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
      marker.setAttribute("id", "arrow");
      marker.setAttribute("viewBox", "0 0 10 10");
      marker.setAttribute("refX", "9");
      marker.setAttribute("refY", "5");
      marker.setAttribute("markerWidth", "6");
      marker.setAttribute("markerHeight", "6");
      marker.setAttribute("orient", "auto-start-reverse");
      const markerPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
      markerPath.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
      markerPath.setAttribute("fill", "#667085");
      marker.appendChild(markerPath);
      defs.appendChild(marker);
      graph.appendChild(defs);

      const laneNames = ["mint source", "minter / malicious", "victim buyers", "honest holders", "current holders", "other"];
      const laneTop = 74;
      const laneGap = Math.max(72, (height - 140) / laneNames.length);
      for (let i = 0; i < laneNames.length; i += 1) {
        const y = laneTop + i * laneGap;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "24");
        line.setAttribute("x2", width - 24);
        line.setAttribute("y1", y);
        line.setAttribute("y2", y);
        line.setAttribute("class", "axis");
        graph.appendChild(line);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", "30");
        label.setAttribute("y", y - 10);
        label.setAttribute("class", "lane-label");
        label.textContent = laneNames[i];
        graph.appendChild(label);
      }

      const blockValues = edges.map((edge) => edge.block_number || 0).filter(Boolean);
      const minBlock = Math.min(...blockValues);
      const maxBlock = Math.max(...blockValues);
      const span = Math.max(1, maxBlock - minBlock);
      const nodeTimes = new Map();
      const touched = new Set();
      for (const edge of edges) {
        touched.add(edge.from_address);
        touched.add(edge.to_address);
        const xValue = edge.block_number || minBlock;
        for (const address of [edge.from_address, edge.to_address]) {
          const current = nodeTimes.get(address);
          nodeTimes.set(address, current === undefined ? xValue : Math.min(current, xValue));
        }
      }

      const nodes = Object.fromEntries(Object.entries(path.nodes || {}).filter(([address]) => touched.has(address)));
      const laneCounts = new Map();
      const positions = new Map();
      for (const [address, node] of Object.entries(nodes)) {
        const lane = roleLane(node);
        const laneIndex = laneCounts.get(lane) || 0;
        laneCounts.set(lane, laneIndex + 1);
        const xBase = 90 + ((nodeTimes.get(address) || minBlock) - minBlock) / span * (width - 180);
        const yBase = laneTop + lane * laneGap;
        const y = yBase + ((laneIndex % 5) - 2) * 12;
        positions.set(address, { x: Math.max(72, Math.min(width - 72, xBase)), y });
      }

      for (const edge of edges) {
        const from = positions.get(edge.from_address);
        const to = positions.get(edge.to_address);
        if (!from || !to) continue;
        const pathElement = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const midX = (from.x + to.x) / 2;
        const bend = edge.channel === "sale" ? -22 : 18;
        pathElement.setAttribute("d", `M ${from.x} ${from.y} C ${midX} ${from.y + bend}, ${midX} ${to.y - bend}, ${to.x} ${to.y}`);
        pathElement.setAttribute("class", "edge");
        pathElement.setAttribute("stroke", edgeColor(edge));
        pathElement.setAttribute("marker-end", "url(#arrow)");
        pathElement.addEventListener("click", () => setDetails("边", [
          ["channel", edge.channel],
          ["contract", edge.contract_address, "mono"],
          ["token", edge.token_id],
          ["from", displayAddress(edge.from_address), "mono"],
          ["to", displayAddress(edge.to_address), "mono"],
          ["tx", edge.tx_hash],
          ["block", edge.block_number],
          ["marketplace", edge.marketplace],
          ["price_eth", edge.price_eth],
          ["price_usd", edge.price_usd],
          ["merged_transfer_count", edge.merged_transfer_count],
          ["merged_transfer_tx_samples", compactList(edge.merged_transfer_tx_hashes, 5)],
          ["seconds_since_mint", edge.seconds_since_mint],
        ]));
        graph.appendChild(pathElement);

        if (edge.channel === "sale") {
          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.setAttribute("x", midX);
          label.setAttribute("y", (from.y + to.y) / 2 - 8);
          label.setAttribute("text-anchor", "middle");
          label.setAttribute("class", "edge-label");
          label.textContent = edge.price_usd ? `$${Number(edge.price_usd).toFixed(1)}` : "sale";
          graph.appendChild(label);
        }
      }

      for (const [address, node] of Object.entries(nodes)) {
        const pos = positions.get(address);
        if (!pos) continue;
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        const radius = Math.min(18, 8 + (node.roles || []).length * 1.8 + Math.sqrt(node.bought_token_count || 0));
        circle.setAttribute("cx", pos.x);
        circle.setAttribute("cy", pos.y);
        circle.setAttribute("r", radius);
        circle.setAttribute("class", "node");
        circle.setAttribute("fill", roleColor(node));
        circle.addEventListener("click", () => setDetails("节点", [
          ["address", node.address],
          ["roles", (node.roles || []).join(", ")],
          ["minted", node.minted_token_count],
          ["bought", node.bought_token_count],
          ["sold", node.sold_token_count],
          ["holding", node.current_holding_token_count],
          ["buy_eth", Number(node.total_buy_eth || 0).toFixed(4)],
          ["buy_usd", Number(node.total_buy_usd || 0).toFixed(2)],
          ["stuck", node.is_stuck_victim],
        ]));
        graph.appendChild(circle);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", pos.x);
        label.setAttribute("y", pos.y + radius + 13);
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("class", "node-label");
        label.textContent = shortAddress(address);
        graph.appendChild(label);
      }
    }

    function render() {
      const path = state.paths[state.selectedContract];
      if (!path) {
        showEmpty("请选择合约。");
        modelOverview.innerHTML = "";
        metrics.innerHTML = "";
        lifecyclePanel.innerHTML = "";
        evidencePanel.innerHTML = "";
        return;
      }
      graphTitle.textContent = `${shortAddress(state.selectedContract)} · ${state.report?.seed_contract?.name || "seed report"}${state.victimOnly ? " · 仅受害者相关" : ""}`;
      const tokenScopedEdges = (path.edges || [])
        .filter((edge) => !state.selectedToken || edge.token_id === state.selectedToken);
      let rawEdges = tokenScopedEdges.filter((edge) => state.channels.has(edge.channel));
      if (state.victimOnly) {
        rawEdges = filterVictimRelatedEdges(path, tokenScopedEdges)
          .filter((edge) => state.channels.has(edge.channel));
      }
      const edges = aggregateEdgesForRender(rawEdges);
      const visibleNodeAddresses = state.victimOnly ? visibleNodeAddressesFromEdges(edges) : null;
      renderModelOverview();
      renderMetrics(path);
      renderLifecyclePanel(path);
      renderEvidencePanel(path);
      renderRoleChart(path, edges, visibleNodeAddresses);
      renderTokenList(path, edges);
      renderRiskList(path, visibleNodeAddresses);
      renderGraph(path, edges);
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      try {
        loadReport(JSON.parse(text), file.name);
      } catch (error) {
        showEmpty(`JSON 解析失败: ${error.message}`);
      }
    });

    contractSelect.addEventListener("change", () => {
      state.selectedContract = contractSelect.value;
      updateTokenOptions();
      setSidebarTab("selection");
      render();
    });

    tokenSelect.addEventListener("change", () => {
      state.selectedToken = tokenSelect.value;
      setSidebarTab("selection");
      render();
    });

    victimOnlyInput.addEventListener("change", () => {
      state.victimOnly = victimOnlyInput.checked;
      setSidebarTab("selection");
      render();
    });

    document.querySelectorAll("[data-channel]").forEach((input) => {
      input.addEventListener("change", () => {
        const channel = input.dataset.channel;
        if (input.checked) state.channels.add(channel);
        else state.channels.delete(channel);
        setSidebarTab("selection");
        render();
      });
    });

    for (const button of sidebarTabButtons) {
      button.addEventListener("click", () => setSidebarTab(button.dataset.sidebarTab));
    }

    window.addEventListener("resize", () => {
      if (roleChartInstance) roleChartInstance.resize();
      render();
    });
    setSidebarTab("global");
    showEmpty("请选择 top_contract_analysis__*.json 文件。");
  </script>
</body>
</html>
