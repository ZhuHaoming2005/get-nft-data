[package]
name = "top_contract_analysis_rs"
version = "0.1.0"
edition = "2021"

[dependencies]
arrow-array = "58.1"
arrow-schema = "58.1"
clap = { version = "4.5", features = ["derive"] }
duckdb = { version = "1.1.1", features = ["bundled"] }
once_cell = "1.21"
parquet = "58.1"
postgres = "0.19"
regex = "1.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strsim = "0.11"
thiserror = "2.0"
tokio = { version = "1.45", features = ["macros", "rt-multi-thread"] }
unicode-normalization = "0.1"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.17"
