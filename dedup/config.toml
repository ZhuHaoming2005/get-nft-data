input_files = ["./data/base.parquet", "./data/ethereum.parquet", "./data/polygon.parquet", "./data/solana.parquet"]
output_dir = "result"
temporary_volumes = ["tmp"]
chains = ["base", "ethereum", "polygon", "solana"]
evm_chains = ["base", "ethereum", "polygon"]
memory_limit = 0
entity_execution_mode = "auto"
uri_execution_mode = "auto"
metadata_execution_mode = "auto"
name_threshold = 95.0
metadata_content_threshold = 0.6
metadata_anchor_tokens = 8

[stage_concurrency]
preflight = 1
entity = 0
name = 0
uri = 0
metadata = 0
report = 0

[metadata_prefilter_parameters]
template_jaccard_threshold = 0.75
# 兼容旧配置；运行时会由 template_jaccard_threshold 与
# target_candidate_recall 确定性推导并覆盖。
lsh_bands = 32
lsh_rows_per_band = 2
target_candidate_recall = 0.99
neighbors_per_target_chain = 16
max_candidates_per_target_chain = 64
max_outgoing_candidates_per_contract = 256
exact_bucket_size_cap = 4096

[metadata_guard_parameters]
min_anchor_documents = 2
stable_value_min_anchors = 2
stable_value_support_ratio = 0.8

[work_budgets]
name_scored_candidates = 10000000000
metadata_prefilter_pairs = 10000000000
metadata_verify_pairs = 10000000000

[quality_gate]
metadata_recall = 0.95
minimum_positive_pairs = 100
sample_seed = 7640891576956012809
