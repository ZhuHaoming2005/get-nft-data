[package]
name = "name_uri_analysis_rs"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
duckdb = { version = "1.1.1", features = ["bundled"] }
indicatif = "0.17"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
strsim = "0.11"
sysinfo = "0.33"
thiserror = "2.0"

[dev-dependencies]
tempfile = "3.17"
